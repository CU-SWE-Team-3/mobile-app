openapi: 3.0.3
info:
  title: BioBeats API
  description: |
    Full REST API specification for the BioBeats music streaming platform.
    BioBeats is a SoundCloud-like platform supporting audio upload, streaming,
    social networking, messaging, playlists, discovery, subscriptions, and admin tools.

    ## Authentication
    Most endpoints require a valid JWT access token. The token can be supplied:
    - As an **HTTP-only cookie** named `accessToken` (set automatically on login).
    - As a **Bearer token** in the `Authorization` header: `Authorization: Bearer <token>`.

    Tokens expire after **15 minutes**. Use `POST /api/auth/refresh` with the
    `refreshToken` cookie (or body field) to obtain new tokens.

    ## Error Format
    All errors follow a consistent shape:
    ```json
    { "success": false, "status": "fail|error", "message": "Human-readable description" }
    ```
    Development mode additionally includes `stack` and `error` fields.
  version: '1.11'
  contact:
    name: BioBeats Engineering
    email: dev@biobeats.com
  license:
    name: ISC

servers:
  - url: https://api.biobeats.com
    description: Production
  - url: http://localhost:5000
    description: Local development

tags:
  - name: Auth
    description: Registration, login, email verification, password reset, Google OAuth, token refresh
  - name: Profile
    description: User profile viewing and editing, social links, privacy, avatar/cover upload
  - name: Network
    description: Follow / unfollow, block / unblock, suggested users, followers, following
  - name: Tracks
    description: Upload pipeline, metadata, visibility, artwork, streaming, download, deletion
  - name: Interactions
    description: Likes and reposts on tracks/playlists; likers/reposters lists
  - name: Comments
    description: Timestamped waveform comments, replies, deletion
  - name: Playlists
    description: Create, read, update, delete playlists; track sequencing, embed codes, artwork
  - name: Player
    description: HLS streaming URL retrieval, persistent player state
  - name: History
    description: Playback progress tracking, recently-played tracks and playlists
  - name: Discovery
    description: Trending charts, genre/artist stations, recommendations, curated buckets
  - name: Messages
    description: Direct messaging, conversations, read receipts, edit / delete
  - name: Notifications
    description: Notification feed, unread count, mark-as-read, delete
  - name: Subscriptions
    description: Stripe checkout, subscription cancellation, webhook
  - name: Admin
    description: Platform analytics, user suspension/restore, track moderation, reports, broadcast

# ─────────────────────────────────────────────────────────────────────────────
# REUSABLE COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────
components:
  # ── Security Schemes ────────────────────────────────────────────────────────
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: HTTP-only cookie set by the server on login/refresh.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Pass the access token in the Authorization header.

  # ── Common Parameters ────────────────────────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-based).
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1
    LimitParam:
      name: limit
      in: query
      description: Items per page (max 100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    MongoIdPath:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId (24 hex characters).
      schema:
        type: string
        pattern: "^[a-f\\d]{24}$"
      example: "507f1f77bcf86cd799439011"

  # ── Shared Schemas ───────────────────────────────────────────────────────────
  schemas:
    # ── Primitives / Enums ──────────────────────────────────────────────────
    MongoId:
      type: string
      pattern: "^[a-f\\d]{24}$"
      example: "507f1f77bcf86cd799439011"

    Role:
      type: string
      enum: [Artist, Listener, Admin]
      example: Artist

    SubscriptionPlan:
      type: string
      enum: [Free, Pro, "Go+"]
      example: Pro

    AccountStatus:
      type: string
      enum: [Active, Suspended, Deleted]
      example: Active

    Gender:
      type: string
      enum: [Female, Male, Custom, "Prefer not to say"]

    ProcessingState:
      type: string
      enum: [Processing, Finished, Failed]
      example: Finished

    AudioFormat:
      type: string
      enum:
        - audio/mpeg
        - audio/mp3
        - audio/wav
        - audio/x-wav
        - audio/wave

    Genre:
      type: string
      enum:
        - All music genres
        - Alternative Rock
        - Ambient
        - Classical
        - Country
        - Dance & EDM
        - Deep house
        - Drum & Bass
        - Electronic
        - Hiphop & rap
        - House
        - Indie
        - Jazz & blues
        - Latin
        - Metal
        - Pop
        - R&B & soul
        - Reggae
        - Rock
        - Soundtrack
        - Techno
        - Trance
        - Trap
        - Arabic
        - Islamic

    License:
      type: string
      enum: [All Rights Reserved, Creative Commons]

    QueueContext:
      type: string
      enum: [none, feed, playlist, track, station, search]

    ReportReason:
      type: string
      enum: [Copyright, Inappropriate Content, Spam, Other]

    ReportStatus:
      type: string
      enum: [Pending, Reviewed, Resolved]

    TargetType:
      type: string
      enum: [Track, Comment, User]

    AttachmentType:
      type: string
      enum: [track, playlist]

    ReleaseType:
      type: string
      enum: [playlist, album, ep, single]

    NotificationType:
    type: string
    enum:
      [
        LIKE,
        REPOST,
        COMMENT,
        FOLLOW,
        MESSAGE,
        NEW_TRACK,
        NEW_PLAYLIST,
        MENTION,
        SYSTEM,
        RECOMMENDED,
      ]

    DiscoveryStation:
      type: object
      properties:
        id:
          type: string
          example: genre_electronic
        title:
          type: string
          example: Electronic
        description:
          type: string
          example: "Top Electronic tracks based on your listening"
        type:
          type: string
          enum: [genre, artist, trending]
          example: genre
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/TrackSummary"

    CuratedBucket:
      type: object
      properties:
        id:
          type: string
          example: fresh_finds
        title:
          type: string
          example: "Fresh finds"
        description:
          type: string
          example: "New uploads trending this week"
        curatedBy:
          type: string
          example: platform
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/TrackSummary"

      # ── Embedded Objects ────────────────────────────────────────────────────

      UserTracksResponse:
        type: object
        description: Paginated list of public finished tracks belonging to a user
        properties:
          success:
            type: boolean
            example: true
          data:
            type: object
            properties:
              total:
                type: integer
                example: 14
              page:
                type: integer
                example: 1
              totalPages:
                type: integer
                example: 2
              tracks:
                type: array
                items:
                  $ref: "#/components/schemas/Track"

      # ── Search ───────────────────────────────────────────────

      AutocompleteResult:
        type: object
        description: Typeahead suggestions matching the start of the query string
        properties:
          tracks:
            type: array
            items:
              type: object
              properties:
                _id:
                  type: string
                  example: "507f1f77bcf86cd799439022"
                title:
                  type: string
                  example: "Midnight Drive"
                permalink:
                  type: string
                  example: "midnight-drive"
                artworkUrl:
                  type: string
                  example: "https://blob/artwork.jpg"
          users:
            type: array
            items:
              type: object
              properties:
                _id:
                  type: string
                  example: "507f1f77bcf86cd799439011"
                displayName:
                  type: string
                  example: "DJ Kemo"
                permalink:
                  type: string
                  example: "dj-kemo"
                avatarUrl:
                  type: string
                  example: "https://blob/avatar.jpg"

      GlobalSearchResult:
        type: object
        description: Full-text search results across tracks, users, and playlists
        properties:
          status:
            type: string
            example: "success"
          results:
            type: integer
            description: Total number of items across all entity types
            example: 9
          data:
            type: object
            properties:
              tracks:
                type: array
                items:
                  $ref: "#/components/schemas/Track"
              users:
                type: array
                items:
                  $ref: "#/components/schemas/User"
              playlists:
                type: array
                items:
                  $ref: "#/components/schemas/PlaylistSummary"

      # ── Discovery ────────────────────────────────────────────

      TrendingTrack:
        type: object
        description: A track enriched with viral score metadata, used on the Trending chart
        properties:
          _id:
            type: string
            example: "507f1f77bcf86cd799439022"
          title:
            type: string
            example: "Neon Pulse"
          permalink:
            type: string
            example: "neon-pulse"
          artworkUrl:
            type: string
            example: "https://blob/artwork.jpg"
          duration:
            type: integer
            example: 214
          genre:
            type: string
            example: "Electronic"
          tags:
            type: array
            items:
              type: string
            example: ["edm", "club"]
          playCount:
            type: integer
            example: 87000
          likeCount:
            type: integer
            example: 3400
          repostCount:
            type: integer
            example: 210
          commentCount:
            type: integer
            example: 65
          containsExplicitContent:
            type: boolean
            example: false
          releaseDate:
            type: string
            format: date-time
            example: "2026-03-01T00:00:00.000Z"
          artist:
            $ref: "#/components/schemas/ArtistSummary"

      DiscoveryStation:
        type: object
        description: A named station (collection of tracks) returned by the mixed / curated endpoints
        properties:
          id:
            type: string
            example: "genre_electronic"
          title:
            type: string
            example: "Electronic"
          description:
            type: string
            example: "Top Electronic tracks based on your listening"
          type:
            type: string
            enum: [genre, artist, trending, curated]
            example: "genre"
          curatedBy:
            type: string
            description: Present only on curated stations
            example: "platform"
          tracks:
            type: array
            items:
              $ref: "#/components/schemas/TrendingTrack"

      MoreOfWhatYouLikeResponse:
        type: object
        properties:
          status:
            type: string
            example: "success"
          results:
            type: integer
            example: 15
          data:
            type: object
            properties:
              tracks:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingTrack"
              basedOn:
                type: string
                enum: [likes, trending]
                description: |
                  `likes` — tracks were selected because the user has liked tracks in these genres.
                  `trending` — user has no likes yet, so the platform fell back to trending tracks.
                example: "likes"
              genres:
                type: array
                description: The genre(s) used to build the recommendation list
                items:
                  type: string
                example: ["Electronic", "House"]

      MixedForYouResponse:
        type: object
        properties:
          status:
            type: string
            example: "success"
          results:
            type: integer
            example: 4
          data:
            type: object
            properties:
              stations:
                type: array
                items:
                  $ref: "#/components/schemas/DiscoveryStation"

      CuratedResponse:
        type: object
        properties:
          status:
            type: string
            example: "success"
          results:
            type: integer
            example: 5
          data:
            type: object
            properties:
              curated:
                type: array
                items:
                  $ref: "#/components/schemas/DiscoveryStation"

      # ── Activity Feed ────────────────────────────────────────

      FeedActor:
        type: object
        description: Condensed user shape used inside a grouped feed activity
        properties:
          _id:
            type: string
            example: "507f1f77bcf86cd799439011"
          displayName:
            type: string
            example: "DJ Kemo"
          permalink:
            type: string
            example: "dj-kemo"
          avatarUrl:
            type: string
            nullable: true
            example: "https://blob/avatar.jpg"

      FeedActivity:
        type: object
        description: |
          A single grouped activity card in the user's fan-out feed.
          Multiple actors performing the same action on the same target are
          collapsed into one entry (e.g., "DJ Kemo and 3 others liked your track").
        properties:
          activityType:
            type: string
            enum: [TRACK_UPLOAD, LIKE, REPOST, PROMOTED]
            example: "LIKE"
          activityDate:
            type: string
            format: date-time
            example: "2026-04-20T18:30:00.000Z"
          actors:
            type: array
            description: Up to 3 actors collapsed into this card
            items:
              $ref: "#/components/schemas/FeedActor"
          target:
            description: The track or playlist this activity refers to
            oneOf:
              - $ref: "#/components/schemas/TrackSummary"
              - $ref: "#/components/schemas/PlaylistSummary"
          targetModel:
            type: string
            enum: [Track, Playlist]
            description: Tells the frontend which card component to render
            example: "Track"
          isAd:
            type: boolean
            description: Present and `true` only for PROMOTED feed cards
            example: false

      ActivityFeedResponse:
        type: object
        properties:
          status:
            type: string
            example: "success"
          results:
            type: integer
            example: 20
          data:
            type: object
            properties:
              feed:
                type: array
                items:
                  $ref: "#/components/schemas/FeedActivity"
              pagination:
                type: object
                properties:
                  nextCursor:
                    type: string
                    nullable: true
                    description: ISO date-time string to pass as `cursor` in the next request. Null when there are no more pages.
                    example: "2026-04-19T12:00:00.000Z"
                  hasMore:
                    type: boolean
                    example: true

      # ── Notifications ────────────────────────────────────────

      NotificationActor:
        type: object
        properties:
          _id:
            type: string
            example: "507f1f77bcf86cd799439011"
          displayName:
            type: string
            example: "DJ Kemo"
          avatarUrl:
            type: string
            example: "https://blob/avatar.jpg"
          permalink:
            type: string
            example: "dj-kemo"
          isPremium:
            type: boolean
            example: false

      Notification:
        type: object
        description: |
          A grouped notification document.  
          Multiple actors performing the same action on the same target are collapsed 
          into one notification (e.g., "DJ Kemo and 2 others liked your track").
        properties:
          _id:
            type: string
            example: "507f1f77bcf86cd799439099"
          recipient:
            type: string
            description: ID of the user who receives this notification
            example: "507f1f77bcf86cd799439011"
          actors:
            type: array
            description: Up to 3 actors shown in the preview; actorCount holds the full total
            items:
              $ref: "#/components/schemas/NotificationActor"
          actorCount:
            type: integer
            description: Total number of actors (may exceed actors array length)
            example: 5
          type:
            type: string
            enum:
              [
                LIKE,
                REPOST,
                COMMENT,
                FOLLOW,
                MESSAGE,
                NEW_TRACK,
                NEW_PLAYLIST,
                MENTION,
                SYSTEM,
              ]
            example: "LIKE"
          target:
            type: object
            nullable: true
            description: The entity this notification refers to (populated from targetModel collection)
            properties:
              _id:
                type: string
                example: "507f1f77bcf86cd799439022"
              title:
                type: string
                example: "Midnight Drive"
              permalink:
                type: string
                example: "midnight-drive"
              artworkUrl:
                type: string
                example: "https://blob/artwork.jpg"
          targetModel:
            type: string
            enum: [Track, Playlist, User, Comment, Message, Album]
            example: "Track"
          contentSnippet:
            type: string
            nullable: true
            description: Short preview text (e.g. first 50 chars of a comment or message)
            example: "The bass drop right here is 🔥"
          isRead:
            type: boolean
            example: false
          actionLink:
            type: string
            nullable: true
            description: Deep-link URL for the notification (present only on SYSTEM notifications)
            example: null
          createdAt:
            type: string
            format: date-time
            example: "2026-04-20T18:00:00.000Z"
          updatedAt:
            type: string
            format: date-time
            example: "2026-04-20T18:00:00.000Z"

      NotificationFeedResponse:
        type: object
        properties:
          success:
            type: boolean
            example: true
          data:
            type: object
            properties:
              notifications:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
              pagination:
                type: object
                properties:
                  total:
                    type: integer
                    example: 47
                  page:
                    type: integer
                    example: 1
                  totalPages:
                    type: integer
                    example: 3

      NotificationPreferences:
        type: object
        description: |
          Per-user notification opt-in settings covering both push (device)
          and email channels, plus message permission control.
        properties:
          pushEnabled:
            type: boolean
            description: Global kill switch — disabling this suppresses all push notifications
            example: true
          allowLikes:
            type: boolean
            description: Receive push notification when someone likes your track or playlist
            example: true
          allowReposts:
            type: boolean
            description: Receive push notification when someone reposts your track or playlist
            example: true
          allowComments:
            type: boolean
            description: Receive push notification when someone comments on your track
            example: true
          allowFollows:
            type: boolean
            description: Receive push notification when someone follows you
            example: true
          allowMessages:
            type: boolean
            description: Receive push notification when someone sends you a message
            example: true
          allowNewTracks:
            type: boolean
            description: Receive push notification when a followed artist uploads a new track or playlist
            example: true
          allowRecommended:
            type: boolean
            description: Receive push notification for personalised track recommendations
            example: true
          emailLikes:
            type: boolean
            description: Receive email when someone likes your track or playlist
            example: true
          emailReposts:
            type: boolean
            description: Receive email when someone reposts your track or playlist
            example: true
          emailComments:
            type: boolean
            description: Receive email when someone comments on your track
            example: true
          emailFollows:
            type: boolean
            description: Receive email when someone follows you
            example: true
          emailMessages:
            type: boolean
            description: Receive email when someone sends you a message
            example: true
          emailNewTracks:
            type: boolean
            description: Receive email when a followed artist uploads a new track or playlist
            example: true
          emailRecommended:
            type: boolean
            description: Receive email for personalised track recommendations
            example: true
          messagePermission:
            type: string
            enum: [Everyone, Following]
            description: |
              Controls who can send you direct messages.
              `Everyone` — any user can message you.
              `Following` — only users you follow can message you.
            example: Everyone
        # ── Admin extras ─────────────────────────────────────────

      AdminTrackListResponse:
        type: object
        properties:
          success:
            type: boolean
            example: true
          total:
            type: integer
            example: 840
          pages:
            type: integer
            example: 42
          data:
            type: array
            items:
              type: object
              properties:
                _id:
                  type: string
                  example: "507f1f77bcf86cd799439022"
                title:
                  type: string
                  example: "Midnight Drive"
                isPublic:
                  type: boolean
                  example: true
                moderationStatus:
                  type: string
                  enum: [Approved, Hidden_By_Admin]
                  example: "Approved"
                processingState:
                  type: string
                  enum: [Processing, Finished, Failed]
                  example: "Finished"
                playCount:
                  type: integer
                  example: 4200
                genre:
                  type: string
                  example: "Electronic"
                createdAt:
                  type: string
                  format: date-time
                  example: "2026-01-10T09:00:00.000Z"
                artist:
                  type: object
                  properties:
                    displayName:
                      type: string
                      example: "DJ Kemo"
                    permalink:
                      type: string
                      example: "dj-kemo"

      AdminUserListResponse:
        type: object
        properties:
          success:
            type: boolean
            example: true
          total:
            type: integer
            example: 1520
          pages:
            type: integer
            example: 76
          data:
            type: array
            items:
              $ref: "#/components/schemas/User"

      DailyActiveUsersDataPoint:
        type: object
        properties:
          date:
            type: string
            description: Human-readable date label for chart axis
            example: "Apr 20"
          activeUsers:
            type: integer
            example: 312

      TopTrackDataPoint:
        type: object
        properties:
          name:
            type: string
            example: "Midnight Drive"
          plays:
            type: integer
            example: 87000

      responses:
        Unauthorized:
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                status: "fail"
                message: "Unauthorized"

    SocialLink:
      type: object
      required: [platform, url]
      properties:
        _id:
          $ref: "#/components/schemas/MongoId"
        platform:
          type: string
          example: Instagram
        url:
          type: string
          format: uri
          example: "https://instagram.com/djtest"

    ArtistSummary:
      type: object
      description: Lightweight artist/user object embedded in track responses.
      properties:
        _id:
          $ref: "#/components/schemas/MongoId"
        displayName:
          type: string
          example: DJ Test
        permalink:
          type: string
          example: dj-test
        avatarUrl:
          type: string
          example: "https://blob/avatars/artwork-123.jpg"
        isPremium:
          type: boolean
          example: false

    TrackSummary:
      type: object
      description: Lightweight track object used in lists and embedded references.
      properties:
        _id:
          $ref: "#/components/schemas/MongoId"
        title:
          type: string
          example: Midnight Groove
        permalink:
          type: string
          example: midnight-groove
        artworkUrl:
          type: string
          example: "https://blob/artworks/artwork-456.jpg"
        duration:
          type: integer
          example: 210
        genre:
          $ref: "#/components/schemas/Genre"
        playCount:
          type: integer
          example: 1500
        likeCount:
          type: integer
          example: 300
        repostCount:
          type: integer
          example: 45
        artist:
          $ref: "#/components/schemas/ArtistSummary"

    PlaylistSummary:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/MongoId"
        title:
          type: string
          example: Chill Vibes
        permalink:
          type: string
          example: chill-vibes
        artworkUrl:
          type: string
          example: "https://blob/playlists/artwork-789.jpg"
        trackCount:
          type: integer
          example: 12
        totalDuration:
          type: integer
          example: 2520
        releaseType:
          $ref: "#/components/schemas/ReleaseType"
        creator:
          $ref: "#/components/schemas/ArtistSummary"

    # ── Core Domain Objects ─────────────────────────────────────────────────
    User:
      type: object
      properties:
        _id:
          $ref: "#/components/schemas/MongoId"
        email:
          type: string
          format: email
          example: dj@beats.com
        displayName:
          type: string
          example: DJ Test
        permalink:
          type: string
          example: dj-test
        bio:
          type: string
          example: "Producer from Cairo"
        country:
          type: string
          example: Egypt
        city:
          type: string
          example: Cairo
        genres:
          type: array
          items:
            type: string
          example: [Electronic, House]
        avatarUrl:
          type: string
          example: "https://blob/avatars/artwork-123.jpg"
        coverUrl:
          type: string
          example: "https://blob/covers/artwork-456.jpg"
        role:
          $ref: "#/components/schemas/Role"
        isPremium:
          type: boolean
          example: false
        subscriptionPlan:
          $ref: "#/components/schemas/SubscriptionPlan"
        subscriptionExpiresAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-25T00:00:00.000Z"
        cancelAtPeriodEnd:
          type: boolean
          example: false
        isEmailVerified:
          type: boolean
          example: true
        isPrivate:
          type: boolean
          example: false
        accountStatus:
          $ref: "#/components/schemas/AccountStatus"
        followerCount:
          type: integer
          example: 420
        followingCount:
          type: integer
          example: 85
        socialLinks:
