  # ──────────────────────────────────────────────────────────
  # ACTIVITY FEED
  # ──────────────────────────────────────────────────────────

  /feed:
    get:
      tags: [Discovery]
      summary: Get the user's personalised activity feed (fan-out)
      description: |
        Returns a **cursor-paginated** list of grouped activity cards from
        people the authenticated user follows.

        ### Activity types
        | activityType | Meaning |
        |---|---|
        | `TRACK_UPLOAD` | An artist the user follows uploaded a new track |
        | `LIKE` | Someone the user follows liked a track or playlist |
        | `REPOST` | Someone the user follows reposted a track or playlist |
        | `PROMOTED` | A sponsored/promoted track injected at position 5 |

        ### Grouping
        Multiple actors performing the same action on the same target within
        the same fetch window are collapsed into a single card.  
        Example: *"DJ Kemo and 4 others liked Neon Pulse"*

        ### Pagination
        Use cursor-based pagination — pass the `nextCursor` value returned in the
        previous response as the `cursor` query parameter in the next request.

        ### Blocking
        Tracks and actors from users with an active block relationship are
        automatically excluded from the feed.

        **Authentication required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          required: false
          schema:
            type: string
            format: date-time
          description: |
            ISO 8601 date-time cursor returned as `nextCursor` from the previous
            page. Omit on the first request.
          example: "2026-04-19T12:00:00.000Z"
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 40
          description: Maximum number of grouped activity cards per page
          example: 40
      responses:
        "200":
          description: Activity feed returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityFeedResponse"
              example:
                status: "success"
                results: 3
                data:
                  feed:
                    - activityType: "TRACK_UPLOAD"
                      activityDate: "2026-04-20T18:30:00.000Z"
                      actors:
                        - _id: "507f1f77bcf86cd799439011"
                          displayName: "DJ Kemo"
                          permalink: "dj-kemo"
                          avatarUrl: "https://blob/avatar.jpg"
                      target:
                        _id: "507f1f77bcf86cd799439022"
                        title: "Neon Pulse"
                        permalink: "neon-pulse"
                        artworkUrl: "https://blob/artwork.jpg"
                        duration: 214
                        playCount: 87000
                        likeCount: 3400
                        artist:
                          displayName: "DJ Kemo"
                          permalink: "dj-kemo"
                          avatarUrl: "https://blob/avatar.jpg"
                      targetModel: "Track"
                    - activityType: "LIKE"
                      activityDate: "2026-04-20T17:00:00.000Z"
                      actors:
                        - _id: "507f1f77bcf86cd799439012"
                          displayName: "Amara Beats"
                          permalink: "amara-beats"
                          avatarUrl: "https://blob/avatar2.jpg"
                      target:
                        _id: "507f1f77bcf86cd799439023"
                        title: "Solar Wind"
                        permalink: "solar-wind"
                        artworkUrl: "https://blob/artwork2.jpg"
                        duration: 198
                        playCount: 54000
                        likeCount: 2100
                        artist:
                          displayName: "Amara Beats"
