  # ──────────────────────────────────────────────────────────
  # NOTIFICATIONS
  # ──────────────────────────────────────────────────────────

  /notifications:
    get:
      tags: [Notifications]
      summary: Get the user's notification feed
      description: |
        Returns a paginated list of notifications for the authenticated user,
        sorted by `updatedAt` descending (most recently updated first).

        Notifications for the same action on the same target are **grouped** —
        e.g., three users liking the same track produce one notification with
        `actorCount: 3` and up to 3 actors in the `actors` array.

        **Authentication required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
      responses:
        "200":
          description: Notification feed returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationFeedResponse"
              example:
                success: true
                data:
                  notifications:
                    - _id: "507f1f77bcf86cd799439099"
                      recipient: "507f1f77bcf86cd799439011"
                      actors:
                        - _id: "507f1f77bcf86cd799439012"
                          displayName: "Amara Beats"
                          avatarUrl: "https://blob/avatar2.jpg"
                          permalink: "amara-beats"
                          isPremium: false
                      actorCount: 1
                      type: "LIKE"
                      target:
                        _id: "507f1f77bcf86cd799439022"
                        title: "Neon Pulse"
                        permalink: "neon-pulse"
                        artworkUrl: "https://blob/artwork.jpg"
                      targetModel: "Track"
                      contentSnippet: null
                      isRead: false
                      actionLink: null
                      createdAt: "2026-04-20T18:00:00.000Z"
                      updatedAt: "2026-04-20T18:00:00.000Z"
                  pagination:
                    total: 47
                    page: 1
                    totalPages: 3
        "400":
          description: User ID could not be resolved from the token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get the unread notification badge count
      description: |
        Returns the number of unread notifications for the authenticated user.
        Designed to be polled periodically (or called once after socket connection)
        to populate the notification bell badge.

        **Authentication required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Unread count returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      unreadCount:
                        type: integer
                        example: 7
              example:
                success: true
                data:
                  unreadCount: 7
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/mark-read:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      description: |
        Sets `isRead: true` on every unread notification belonging to the
        authenticated user and emits an `all_notifications_read` Socket.IO
        event to all connected devices.

        **Authentication required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "All notifications successfully marked as read"
                  data:
                    type: object
                    properties:
                      modifiedCount:
                        type: integer
                        description: Number of notifications that were updated
                        example: 12
              example:
                success: true
                message: "All notifications successfully marked as read"
                data:
                  modifiedCount: 12
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/fcm-token:
    post:
      tags: [Notifications]
      summary: Register a device FCM token for push notifications
      description: |
        Adds an FCM (Firebase Cloud Messaging) device token to the user's
        account. The same token is silently ignored if already registered
        (`$addToSet` semantics).

        Call this on app launch after the user grants notification permission.

        **Authentication required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: FCM device registration token from the Firebase SDK
                  example: "fMq3XYZ...long-fcm-token-string"
      responses:
        "200":
          description: Device registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                success: true
                message: "Device registered for push notifications"
        "400":
          description: FCM token missing from request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                status: "fail"
                message: "FCM Token is required"
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      tags: [Notifications]
      summary: Unregister a device FCM token
      description: |
        Removes an FCM device token from the user's account.
        Call this on logout or when the user revokes notification permission.

        **Authentication required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: FCM device registration token to remove
                  example: "fMq3XYZ...long-fcm-token-string"
      responses:
        "200":
          description: Device unregistered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                success: true
                message: "Device unregistered"
        "400":
          description: FCM token missing from request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/preferences:
    get:
      tags: [Notifications]
      summary: Get current notification preferences
      description: |
        Returns the authenticated user's current notification preference settings
        for both push (device) and email channels, plus the message permission setting.

        **Authentication required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Preferences returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/NotificationPreferences"
              example:
                success: true
                data:
                  pushEnabled: true
                  allowLikes: true
                  allowReposts: true
                  allowComments: true
                  allowFollows: true
                  allowMessages: true
                  allowNewTracks: true
                  allowRecommended: true
                  emailLikes: true
                  emailReposts: true
                  emailComments: true
                  emailFollows: true
                  emailMessages: true
                  emailNewTracks: true
                  emailRecommended: true
                  messagePermission: Everyone
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                status: fail
                message: "User not found"

    patch:
      tags: [Notifications]
      summary: Update notification preferences
      description: |
        Updates the user's per-category notification opt-in settings for both
        push (device) and email channels.
        All fields are **optional** — only the fields provided will be updated.

        **Push channel fields:**
        - `pushEnabled` — global kill switch for all push notifications
        - `allowLikes` — push when someone likes your track/playlist
        - `allowReposts` — push when someone reposts your track/playlist
        - `allowComments` — push when someone comments on your track
        - `allowFollows` — push when someone follows you
        - `allowMessages` — push when someone sends you a message
        - `allowNewTracks` — push when a followed artist uploads a new track
        - `allowRecommended` — push for personalised track recommendations

        **Email channel fields:**
        - `emailLikes` — email when someone likes your track/playlist
        - `emailReposts` — email when someone reposts your track/playlist
        - `emailComments` — email when someone comments on your track
        - `emailFollows` — email when someone follows you
        - `emailMessages` — email when someone sends you a message
        - `emailNewTracks` — email when a followed artist uploads a new track
        - `emailRecommended` — email for personalised track recommendations

        **Message permission:**
        - `messagePermission` — controls who can send you messages
          - `Everyone` — anyone can message you
          - `Following` — only users you follow can message you

        Setting `pushEnabled: false` suppresses **all** push notifications
        regardless of individual category flags.

        **Authentication required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferences"
            examples:
              disableAllPush:
                summary: Disable all push notifications
                value:
                  pushEnabled: false
              muteMessagesPush:
                summary: Mute message push notifications only
                value:
                  allowMessages: false
              muteEmailFollows:
                summary: Stop receiving follow emails
                value:
                  emailFollows: false
              restrictMessages:
                summary: Only allow messages from people you follow
                value:
                  messagePermission: Following
              fullCustom:
                summary: Fully customised preferences
                value:
                  pushEnabled: true
                  allowLikes: true
                  allowReposts: false
                  allowComments: true
                  allowFollows: true
                  allowMessages: true
                  allowNewTracks: true
                  allowRecommended: true
                  emailLikes: true
                  emailReposts: false
                  emailComments: true
                  emailFollows: true
                  emailMessages: false
                  emailNewTracks: true
                  emailRecommended: false
                  messagePermission: Everyone
      responses:
        "200":
          description: Preferences updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/NotificationPreferences"
              example:
                success: true
                data:
                  pushEnabled: true
                  allowLikes: true
                  allowReposts: false
                  allowComments: true
                  allowFollows: true
                  allowMessages: true
                  allowNewTracks: true
                  allowRecommended: true
                  emailLikes: true
                  emailReposts: false
                  emailComments: true
                  emailFollows: true
                  emailMessages: false
                  emailNewTracks: true
                  emailRecommended: false
                  messagePermission: Everyone
        "400":
          description: Invalid field value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                status: fail
                message: "messagePermission must be Everyone or Following"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                status: fail
                message: "User not found"

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark a single notification as read
      description: |
        Sets `isRead: true` on a specific notification belonging to the
        authenticated user and emits a `notification_read` Socket.IO event.
        Returns the updated notification document.

        **Authentication required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[a-fA-F0-9]{24}$"
          description: MongoDB ObjectId of the notification
          example: "507f1f77bcf86cd799439099"
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      notification:
                        $ref: "#/components/schemas/Notification"
              example:
                success: true
                data:
                  notification:
                    _id: "507f1f77bcf86cd799439099"
                    type: "LIKE"
                    isRead: true
                    actorCount: 1
                    actors:
                      - displayName: "Amara Beats"
                        avatarUrl: "https://blob/avatar2.jpg"
                    target:
                      title: "Neon Pulse"
                      permalink: "neon-pulse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Notification not found or does not belong to this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                status: "fail"
                message: "Notification not found"

  /notifications/{id}:
    delete:
      tags: [Notifications]
      summary: Delete a single notification
      description: |
        Permanently deletes a notification belonging to the authenticated user
        and emits a `notification_deleted` Socket.IO event.

        **Authentication required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[a-fA-F0-9]{24}$"
          description: MongoDB ObjectId of the notification to delete
          example: "507f1f77bcf86cd799439099"
      responses:
        "200":
          description: Notification deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                success: true
                message: "Notification deleted successfully."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Notification not found or does not belong to this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                status: "fail"
                message: "Notification not found or you do not have permission to delete it"

  # ──────────────────────────────────────────────────────────
  # ADMIN — additional endpoints
  # ──────────────────────────────────────────────────────────

  /admin/tracks:
    get:
      tags: [Admin]
      summary: Get paginated track list for admin content management
      description: |
        Returns a searchable, filterable, paginated list of all tracks on the
        platform for use in the **Admin Dashboard → Content Management** panel.

        Supports filtering by title search, genre, publication status, and upload date range.

        **Admin role required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Case-insensitive regex match on track title
          example: "midnight"
        - in: query
          name: genre
          required: false
          schema:
            type: string
          description: Exact genre match (e.g. "Electronic")
          example: "Electronic"
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [Published, Draft]
          description: |
            `Published` → `isPublic: true`  
            `Draft` → `isPublic: false`
          example: "Published"
        - in: query
          name: uploadDate
          required: false
          schema:
            type: string
            enum: ["All Time", "7days", "30days"]
          description: Filter by upload date range from today
          example: "30days"
      responses:
        "200":
          description: Track list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTrackListResponse"
              example:
                success: true
                total: 840
                pages: 42
                data:
                  - _id: "507f1f77bcf86cd799439022"
                    title: "Midnight Drive"
                    isPublic: true
                    moderationStatus: "Approved"
                    processingState: "Finished"
                    playCount: 4200
                    genre: "Electronic"
                    createdAt: "2026-01-10T09:00:00.000Z"
                    artist:
                      displayName: "DJ Kemo"
                      permalink: "dj-kemo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Admin access required"

  /admin/users:
    get:
      tags: [Admin]
      summary: Get paginated user list for admin user management
      description: |
        Returns a searchable, filterable, paginated list of all platform users
        for use in the **Admin Dashboard → User Management** panel.

        Supports searching by `displayName` or `permalink` and filtering by `accountStatus`.

        **Admin role required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Case-insensitive regex search across `displayName` and `permalink`
          example: "kemo"
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [Active, Suspended, Deleted]
          description: Filter by account status
          example: "Active"
      responses:
        "200":
          description: User list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
              example:
                success: true
                total: 1520
                pages: 76
                data:
                  - _id: "507f1f77bcf86cd799439011"
                    displayName: "DJ Kemo"
                    permalink: "dj-kemo"
                    email: "kemo@example.com"
                    role: "Artist"
                    accountStatus: "Active"
                    isPremium: true
                    followerCount: 1200
                    followingCount: 340
                    createdAt: "2025-09-01T00:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats/daily-users:
    get:
      tags: [Admin]
      summary: Get daily active users time-series for the admin analytics chart
      description: |
        Returns one data point per day for the last N days, where each point is
        the count of **unique users** who had any listen history record on that day.

        Used to render the **Daily Active Users** line chart in the Admin Dashboard.

        **Admin role required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: query
          name: days
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
          description: Number of past days to include in the series
          example: 30
      responses:
        "200":
          description: Daily active user series returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DailyActiveUsersDataPoint"
              example:
                success: true
                data:
                  - date: "Apr 01"
                    activeUsers: 280
                  - date: "Apr 02"
                    activeUsers: 305
                  - date: "Apr 03"
                    activeUsers: 312
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats/top-tracks:
    get:
      tags: [Admin]
      summary: Get top tracks by total play count for the admin analytics chart
      description: |
        Returns the N most-played tracks on the platform as simple
        `{ name, plays }` objects ready for a bar chart component.

        Used to render the **Top Tracks** bar chart in the Admin Dashboard.

        **Admin role required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: query
