                  - name: "Neon Pulse"
                    plays: 87000
                  - name: "Solar Wind"
                    plays: 54000
                  - name: "Desert Rain"
                    plays: 21000
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/broadcast:
    post:
      tags: [Admin]
      summary: Broadcast a system notification to all users
      description: |
        Sends a `SYSTEM` type in-app notification to every registered user and
        emits a real-time Socket.IO `new_notification` event to all connected
        clients simultaneously.

        Optionally include an `actionLink` to deep-link users to a specific page
        (e.g., a new feature announcement or a policy update URL).

        **Admin role required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: The notification body text shown to all users
                  example: "BioBeats will undergo scheduled maintenance on May 1st from 2–4 AM UTC."
                actionLink:
                  type: string
                  nullable: true
                  description: Optional URL to attach to the notification (e.g. a blog post or status page)
                  example: "https://status.biobeats.com"
            examples:
              simpleAnnouncement:
                summary: Plain announcement with no link
                value:
                  message: "New feature alert — Collaborative Playlists are live!"
              withLink:
                summary: Announcement with a deep link
                value:
                  message: "BioBeats scheduled maintenance on May 1st 2–4 AM UTC."
                  actionLink: "https://status.biobeats.com"
      responses:
        "200":
          description: Broadcast sent successfully to all users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "System broadcast successfully sent to 1520 users."
              example:
                success: true
                message: "System broadcast successfully sent to 1520 users."
        "400":
          description: Broadcast message body is missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                status: "fail"
                message: "Broadcast message is required."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/warn:
    post:
      tags: [Admin]
      summary: Send an official warning to a user
      description: |
        Sends an official warning to the specified user via two channels simultaneously:

        1. **In-app notification** — a `SYSTEM` notification containing the warning message
        2. **Email** — a formal warning email sent to the user's registered email address

        Use this before escalating to suspension. The warning is not stored as a
        separate entity; it appears in the user's notification feed.

        **Admin role required.**
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/MongoIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: The warning reason / message body shown to the user
                  example: "Your recently uploaded track contains copyrighted material that violates our Terms of Service. Please remove it immediately to avoid suspension."
            examples:
              copyrightWarning:
                summary: Copyright violation warning
                value:
                  message: "Your track 'Midnight Drive' contains copyrighted material. Please remove it within 48 hours to avoid suspension."
              contentWarning:
                summary: Inappropriate content warning
                value:
                  message: "A comment you posted has been flagged for violating our community guidelines on hate speech. Further violations will result in account suspension."
      responses:
        "200":
          description: Warning sent successfully via in-app notification and email
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Official warning sent to user successfully"
              example:
                success: true
                message: "Official warning sent to user successfully"
        "400":
          description: Warning message is missing from the request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                status: "fail"
                message: "A warning message is required"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                status: "fail"
                message: "User not found"