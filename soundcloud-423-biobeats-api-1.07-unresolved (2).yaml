                                  type: integer
                                  example: 10
                                repostCount:
                                  type: integer
                                  example: 2
                                createdAt:
                                  type: string
                                  format: date-time
                                  example: "2026-03-19T01:55:57.237Z"
                      pagination:
                        type: object
