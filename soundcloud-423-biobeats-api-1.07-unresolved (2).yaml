                                  $ref: '#/components/schemas/User'
                                hlsUrl:
                                  type: string
                                  example: "https://biobeats.blob.core.windows.net/hls/trackid/playlist.m3u8"
                                artworkUrl:
                                  type: string
                                  example: "https://biobeats.blob.core.windows.net/artworks/artwork-123.jpg"
                                duration:
                                  type: integer
                                  example: 38
                                playCount:
                                  type: integer
                                  example: 3
