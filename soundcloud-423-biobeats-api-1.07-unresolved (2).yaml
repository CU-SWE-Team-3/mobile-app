# ==========================================
  # PLAYBACK & STREAMING ENGINE (MODULE 5)
  # ==========================================

  /player/state:
    get:
      tags: ["Playback & Streaming Engine"]
      summary: Get current player state
      description: Retrieves the user's last saved playback position and track for cross-device sync.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Player state retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/PlayerState'
        '401':
          description: Unauthorized - User not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: ["Playback & Streaming Engine"]
      summary: Update player state (Heartbeat)
      description: Continuously syncs the user's current playback time to the database.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentTrack, currentTime, isPlaying]
              properties:
                currentTrack:
                  type: string
                  description: Valid Track ID
                currentTime:
                  type: number
                  example: 45.5
                isPlaying:
                  type: boolean
                queueContext:
                  type: string
                  enum: ['none', 'feed', 'playlist', 'track', 'station', 'search']
                contextId:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Player state updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/PlayerState'
        '400':
          description: Bad Request - Invalid track ID or missing data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - User not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /player/{id}/stream:
    get:
      tags: ["Playback & Streaming Engine"]
      summary: Get high-fidelity stream URL
      description: Evaluates tier permissions and track visibility before returning the HLS playlist URL.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Valid Track ID
      responses:
        '200':
          description: Stream access granted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/StreamData'
        '400':
          description: Track audio still processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - User not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Private track or insufficient tier access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Track not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /history/progress:
    post:
      tags: ["Playback & Streaming Engine"]
      summary: Record playback progress
      description: |
        Called periodically while a track is playing (e.g. every 5 seconds).
        Saves the user's current position in the track.
        - If progress exceeds 90% of track duration, the play is counted once.
        - If progress drops below 10% (restart), the play count lock resets.
        - If playlistId is provided, the playlist is also recorded as recently played.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - trackId
                - progress
              properties:
                trackId:
                  type: string
                  description: MongoDB ObjectId of the track being played.
                  example: "507f1f77bcf86cd799439022"
                progress:
                  type: number
                  minimum: 0
                  description: Current playback position in seconds.
                  example: 165
                playlistId:
                  type: string
                  nullable: true
                  description: MongoDB ObjectId of the playlist the track is being played from. Omit if playing standalone.
                  example: "507f1f77bcf86cd799439033"
            examples:
              standalone:
                summary: Track played standalone (no playlist)
                value:
                  trackId: "507f1f77bcf86cd799439022"
                  progress: 50
              fromPlaylist:
                summary: Track played from inside a playlist
                value:
                  trackId: "507f1f77bcf86cd799439022"
                  progress: 50
                  playlistId: "507f1f77bcf86cd799439033"
              triggerPlayCount:
                summary: Progress at 90%+ triggers play count
                value:
                  trackId: "507f1f77bcf86cd799439022"
                  progress: 165
              restart:
                summary: Progress under 10% resets play count lock
                value:
                  trackId: "507f1f77bcf86cd799439022"
                  progress: 5
      responses:
        '200':
          description: Progress recorded successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      history:
                        $ref: '#/components/schemas/TrackHistoryRecord'
              example:
                status: "success"
                data:
                  history:
                    _id: "507f1f77bcf86cd799439044"
                    type: "track"
                    track: "507f1f77bcf86cd799439022"
                    playlist: null
                    progress: 165
                    isPlayCounted: true
                    playedAt: "2026-04-20T20:00:00.000Z"
        '400':
          description: Missing trackId or progress / invalid playlistId format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  summary: Missing required fields
                  value:
                    success: false
                    status: "fail"
                    message: "Please provide both trackId and progress."
                badPlaylistId:
                  summary: Invalid playlistId format
                  value:
                    success: false
                    status: "fail"
                    message: "playlistId must be a valid Playlist ID"
        '401':
          description: Unauthorized — missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

