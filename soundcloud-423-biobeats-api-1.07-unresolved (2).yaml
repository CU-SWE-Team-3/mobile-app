  # ==========================================
  # MODERATION AND ADMIN DASHBOARD
  # ==========================================
  /admin/reports:
    post:
      summary: Submit a new report (User-Facing)
      description: Allows any logged-in user to report a track, comment, or another user.
      tags: 
        - Admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportInput'
      responses:
        '201':
          description: Report submitted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseSuccessResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: "Report submitted successfully"
                      data:
                        $ref: '#/components/schemas/ReportData'
          
    get:
      summary: Get all pending reports (Admin Only)
      description: Fetches a paginated list of all unresolved reports.
      tags: 
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: A list of pending reports
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseSuccessResponse'
                  - type: object
                    properties:
                      results:
                        type: integer
                        example: 1
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ReportData'
  /admin/reports/{id}/status:
    patch:
      summary: Update a report's status (Admin Only)
      description: Mark a report as Reviewed or Resolved.
      tags: 
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MongoIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [Pending, Reviewed, Resolved]
      responses:
        '200':
          description: Report status updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseSuccessResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: "Report marked as Resolved"
                      data:
                        $ref: '#/components/schemas/ReportData'
          
  /admin/stats:
    get:
      summary: Get platform analytics (Admin Only)
      description: Returns platform health metrics including user counts, track storage, and play-through rates.
      tags: 
        - Admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Analytics retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardStats'
  /admin/users/{id}/suspend:
    patch:
      summary: Suspend a user account (Admin Only)
      description: Immediately changes a user's accountStatus to 'Suspended'.
      tags: 
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MongoIdParam'
      responses:
        '200':
          description: User suspended successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModerationResponse'
        '400':
          description: Bad Request (Already suspended or Invalid ID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (Cannot suspend another Admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found

  /admin/users/{id}/restore:
    patch:
      summary: Restore a suspended user account (Admin Only)
      description: Lifts a suspension and returns the user's accountStatus to 'Active'.
      tags: 
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MongoIdParam'
      responses:
        '200':
          description: User restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModerationResponse'
        '400':
          description: Bad Request (This user is already active or Invalid ID format)
        '404':
          description: User not found

  /admin/tracks/{id}/hide:
    patch:
      summary: Hide a track (Admin Only)
      description: Changes a track's moderationStatus to 'Hidden_By_Admin'.
      tags: 
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MongoIdParam'
      responses:
        '200':
          description: Track hidden successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackModerationResponse'
        '400':
          description: Bad Request (Already hidden or Invalid ID)
        '404':
          description: Track not found

  /admin/tracks/{id}/restore:
    patch:
      summary: Restore a hidden track (Admin Only)
      description: Lifts a ban on a track, changing its moderationStatus back to 'Approved'.
      tags: 
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MongoIdParam'
      responses:
        '200':
          description: Track restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackModerationResponse'
        '400':
          description: Bad Request (Already public or Invalid ID)
        '404':
          description: Track not found
  # ==========================================
  # SUBSCRIPTION & BILLING ROUTES
  # ==========================================
  /subscriptions/checkout:
    post:
      summary: Create a Stripe Checkout Session
      description: Generates a secure Stripe URL for upgrading to Pro or Go+.
      tags:
        - Subscriptions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - planType
              properties:
                planType:
                  type: string
                  enum: [Pro, Go+]
                  example: Pro
      responses:
        '200':
          description: Checkout session created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  checkoutUrl:
                    type: string
        '400':
          description: Invalid plan type or user already premium.
        '401':
          description: Unauthorized - User not logged in.

  /subscriptions/cancel:
    post:
      summary: Cancel an active subscription
      description: Sets cancelAtPeriodEnd to true. User retains premium features until their billing cycle ends.
      tags:
        - Subscriptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Subscription marked for cancellation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time
        '400':
          description: User has no active subscription.