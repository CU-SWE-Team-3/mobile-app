            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tracks/{trackId}/comments:
    post:
      tags: [Engagement & Social Interactions]
      summary: Add a timestamped comment
      description: Leave a comment at a specific second in the audio playback. Replies are restricted to one level deep.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: trackId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, timestamp]
              properties:
                content:
                  type: string
                  maxLength: 1000
                timestamp:
                  type: integer
                  minimum: 0
                parentCommentId:
                  type: string
                  description: Optional. Include this to reply to an existing comment.
      responses:
        '201':
          description: Comment added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      comment:
                        $ref: '#/components/schemas/Comment'
        '400':
          description: Validation error or tried to reply to a reply
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Engagement & Social Interactions]
      summary: Get all comments for a track
      description: Returns top-level comments and their nested replies, sorted by audio timestamp.
      parameters:
        - in: path
          name: trackId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Comments fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                  total:
                    type: integer
                  data:
                    type: object
                    properties:
                      comments:
                        type: array
                        items:
                          $ref: '#/components/schemas/Comment'

  /comments/{commentId}:
    delete:
      tags: [Engagement & Social Interactions]
      summary: Delete a comment
      description: Deletes a comment. If it is a parent comment, it cascades and deletes all replies. Only the author can delete it.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - in: path
          name: commentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Comment deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '403':
          description: Not authorized to delete this comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  # ==========================================
