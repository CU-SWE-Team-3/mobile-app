  # ==========================================
  /playlists:
    get:
      summary: Get all playlists (Library & Discovery)
      description: Fetches a list of playlists. Supports filtering by creator or releaseType. Handles privacy automatically (guests see only public, creators see their own private).
      tags:
        - Playlists
      security:
        - bearerAuth: []
        - {} # The empty object makes the token optional!
      parameters:
        - in: query
          name: creator
          schema:
            type: string
          description: Filter by the User ObjectId (e.g., for viewing a profile library)
        - in: query
          name: releaseType
          schema:
            type: string
            enum: [playlist, album, ep, single]
          description: Filter by the type of collection
      responses:
        '200':
          description: Successfully retrieved a list of playlists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistListResponse'
    post:
      summary: Create a new playlist
      tags:
        - Playlists
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaylistInput'
